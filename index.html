<!DOCTYPE html>
<html lang="en" class="no-js">
    <head>
        <meta charset="utf-8">
        <title>HTC One X — pure CSS</title>
        <meta name="description" content="The HTC One X drawn entirely in CSS.">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" href="data:,">
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
        <div class="phone_shadow"></div>
        <div class="phone">
        	<div class="volume_rocker"></div>
        	<div class="body">
        		<div class="body_noise">
        			<div class="shadow">
        				<div class="shadow_inner">
        					<div class="speaker_camera">
        						<div class="speaker"></div>
        						<div class="speaker"></div>
        						<div class="camera_back">
        							<div class="camera_inner"></div>
        						</div>
        					</div>
        					<div class="display_back">
        						<div class="display">
        							<span class="logo" aria-hidden="true">!</span>
        							<div class="display_stuff">
        								<img src="img/bootanim.gif" alt="HTC boot animation — quietly brilliant">
        								<!-- Put your content here -->
        							</div>
        							<nav class="menu" aria-label="Phone navigation">
        								<a href="#" aria-label="Back"><span aria-hidden="true">$</span></a>
        								<a href="#" aria-label="Home"><span aria-hidden="true">#</span></a>
        								<a href="#" aria-label="Menu"><span aria-hidden="true">&quot;</span></a>
        							</nav>
        						</div>
        					</div>
        				</div>
        			</div>
        		</div>
        	</div>
        </div>
        <div class="info">
        	<p class="htc">One X</p>
        	<p class="about">
        		Amazing camera<br>Authentic sound
        	</p>
        	<a href="https://github.com/eboye/HTC-OneX-CSS3" class="buy">fork this from git</a>
        </div>
    </body>
</html>
